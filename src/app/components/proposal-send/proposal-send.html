<div class="proposal-send-container">
  <h3>Submit a Proposal</h3>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

  <form (ngSubmit)="submit()">
    <label>
      Price
      <input [(ngModel)]="price" name="price" type="number" placeholder="e.g. 500"/>
    </label>

    <label>
      Cover Letter
      <textarea [(ngModel)]="cover_letter" name="cover_letter" placeholder="Describe why you're the best fit..."></textarea>
    </label>

    <label>
      Message
      <textarea [(ngModel)]="message" name="message" placeholder="Any additional message..."></textarea>
    </label>

    <button type="submit">Submit Proposal</button>
  </form>
</div>
