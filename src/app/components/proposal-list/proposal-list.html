<div class="proposals-container">
  <h3>Proposals</h3>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="proposals-list">
    <div *ngFor="let proposal of proposals" class="proposal-card">
      <div class="proposal-header">
        <span class="proposal-status" [ngClass]="proposal.status">{{ proposal.status }}</span>
        <span class="proposal-price">${{ proposal.price }}</span>
      </div>

      <p *ngIf="proposal.cover_letter" class="proposal-content">{{ proposal.cover_letter }}</p>
      <p *ngIf="proposal.message" class="proposal-content">{{ proposal.message }}</p>

      <div class="proposal-actions" *ngIf="proposal.status === 'pending'">
        <button (click)="acceptProposal(proposal.id)" class="btn-accept">Accept</button>
      </div>
    </div>

    <p *ngIf="proposals.length === 0" class="no-results">No proposals yet.</p>
  </div>
</div>
