<p>platform-stats works!</p>

<div class="stats-container">

  <h2>Platform Statistics</h2>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div *ngIf="stats" class="stats-card">
    <p><strong>Total Users:</strong> {{ stats.total_users }}</p>
    <p><strong>Active Jobs:</strong> {{ stats.active_jobs }}</p>
    <p><strong>Total Value Moved:</strong> ${{ stats.total_value_moved }}</p>
  </div>

</div>
