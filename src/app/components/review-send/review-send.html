<div class="review-send-container">
  <h2>Leave a Review</h2>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

  <label>Rating (1 to 5)</label>
  <input type="number" [(ngModel)]="rating" name="rating" min="1" max="5"/>

  <label>Comment</label>
  <textarea [(ngModel)]="comment" name="comment" placeholder="Share your experience..."></textarea>

  <button (click)="send()">Submit Review</button>
</div>
