<div class="bids-container">
  <h2>My Bids</h2>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="bids-list">
    <div *ngFor="let proposal of proposals" class="bid-card">
      <div class="bid-header">
        <span class="bid-status" [ngClass]="proposal.status">{{ proposal.status }}</span>
        <span class="bid-price">${{ proposal.price }}</span>
      </div>

      <p *ngIf="proposal.cover_letter" class="bid-content">{{ proposal.cover_letter }}</p>
      <p *ngIf="proposal.message" class="bid-content">{{ proposal.message }}</p>
    

    <button 
        *ngIf="proposal.status === 'pending'"
        class="btn-delete"
        (click)="deleteProposal(proposal.id)"
      >
        Delete Proposal
      </button>
      </div>


    <p *ngIf="proposals.length === 0" class="no-results">You have no bids yet.</p>
  </div>
</div>
