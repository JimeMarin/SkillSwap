<div class="reviews-container">
  <h2>User Reviews</h2>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="reviews-list">
    <div *ngFor="let r of reviews" class="review-card">
      <div class="review-header">
        <div class="review-stars">
          <span *ngFor="let star of [1,2,3,4,5]">
            {{ star <= r.rating ? '⭐' : '☆' }}
          </span>
        </div>
        <span class="review-rating">{{ r.rating }}/5</span>
      </div>

      <p *ngIf="r.comment" class="review-comment">{{ r.comment }}</p>

      <div class="review-footer">
        <span class="review-meta">Job: {{ r.job_id }}</span>
        <span class="review-meta">By: {{ r.reviewer_id }}</span>
      </div>
    </div>

    <p *ngIf="reviews.length === 0 && !errorMessage" class="no-results">
      No reviews found for this user.
    </p>
  </div>
</div>
